name: aee
channels:
  - conda-forge
  - defaults
dependencies:
  # Base Python & Data Science Stack
  - python=3.11
  - pip
  - pandas
  - numpy
  - scipy
  - matplotlib
  - seaborn
  - tqdm
  - jupyterlab
  - ipywidgets
  - pytest
  
  # Pip dependencies
  - pip:
      # --- Core Frameworks ---
      - dspy-ai>=2.5.0          # LLM Orchestration (MIPROv2 support)
      - pydantic>=2.0           # Data Validation
      - pydantic-settings       # Config management
      
      # --- Web UI (Streamlit) ---
      - streamlit               # Frontend
      - watchdog                # Auto-reload for development
      
      # --- LLM Providers ---
      - google-generativeai     # Gemini
      - openai                  # Fallback / Tokenizer
      - tiktoken                # Token counting
      
      # --- Ingestion / PDF Parsers ---
      - docling                 # IBM Docling
      - onnxruntime             # Required for RapidOCR (CPU) stability
      - pymupdf                 # Fast PDF processing
      - pdfplumber              # Legacy table extraction
      - marker-pdf              # Marker (Heavy dependency, includes PyTorch)
      
      # --- Data Utilities ---
      - datasets                # Hugging Face Datasets
      - python-dotenv           # Loading .env files