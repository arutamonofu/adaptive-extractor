# Task configuration for nanozyme extraction
# VERSION 3: Aligned with Ground Truth for MIPROv2 evaluation, with declarative descriptions.
name: nanozymes
fields:
  formula:
    type: str
    description: "The chemical formula of the nanozyme (e.g., Fe3O4, CeO2, Au, etc.)"
    required: true
  surface:
    type: str
    description: "Type of surface modification of the nanoparticle (e.g., functionalization, coating, doping molecule name)"
    required: false
  syngony:
    type: str
    description: "The crystal system of the nanozyme (e.g., cubic, hexagonal, monoclinic, etc.)"
    choices: [cubic, hexagonal, tetragonal, monoclinic, orthorhombic, trigonal, triclinic, amorphous, rhombohedral]
    required: false
  length:
    type: str
    description: "Length of the nanoparticle in nanometers"
    required: false
  width:
    type: str
    description: "Width of the nanoparticle in nanometers"
    required: false
  depth:
    type: str
    description: "Depth/thickness of the nanoparticle in nanometers"
    required: false
  activity:
    type: str
    description: "Type of catalytic activity of the nanozyme (e.g., peroxidase-like, catalase-like, oxidase-like, etc.)"
    required: true
    choices: [peroxidase, oxidase, catalase, laccase, superoxide_dismutase, glucose oxidase, other]
  reaction_type:
    type: str
    description: "Type of catalyzed reaction (e.g., TMB + H2O2 or TMB, etc.)"
    required: false
  km_value:
    type: str
    description: "The numerical value of the Michaelis constant (Km)"
    required: false
  km_unit:
    type: str
    description: "Unit of measurement for the Michaelis constant (e.g., mM, µM)"
    required: false
  vmax_value:
    type: str
    description: "The numerical value of the maximum reaction rate (Vmax)"
    required: false
  vmax_unit:
    type: str
    description: "Unit of measurement for Vmax (e.g., mM/s, µM/min)"
    required: false
  ph:
    type: str
    description: "pH value at which the reaction was conducted"
    required: false
  temperature:
    type: str
    description: "The temperature at which the reaction was conducted (in °C)"
    required: false
  c_min:
    type: str
    description: "Minimum substrate concentration in millimolar"
    required: false
  c_max:
    type: str
    description: "Maximum substrate concentration in millimolar"
    required: false
  c_const:
    type: str
    description: "Value of the constant concentration of an unchanged parameter in the reaction"
    required: false
  c_const_unit:
    type: str
    description: "Unit of measurement for the constant concentration(e.g., mM, µM)"
    required: false
  ccat_value:
    type: str
    description: "Value of the catalyst(nanozyme) concentration"
    required: false
  ccat_unit:
    type: str
    description: "Unit of measurement for the catalyst concentration(e.g., mM, µM, mg/ml)"
    required: false
compare_fields: [formula, activity, syngony, surface, length, width, depth, reaction_type, km_value, km_unit, vmax_value, vmax_unit, ph, temperature, c_min, c_max, c_const, c_const_unit, ccat_value, ccat_unit]
float_tolerance: 0.05
row_converter:
  formula: [formula, name]
  surface: [surface, surface_chemistry, coating]
  syngony: [syngony, crystal_system]
  length: [length, size, diameter]
  width: [width]
  depth: [depth]
  activity: [activity, catalytic_activity]
  reaction_type: [reaction_type, reaction]
  km_value: [km_value, km, km_val]
  km_unit: [km_unit]
  vmax_value: [vmax_value, vmax, vmax_val]
  vmax_unit: [vmax_unit]
  ph: [ph, pH]
  temperature: [temperature, temp]
  c_min: [c_min, cmin]
  c_max: [c_max, cmax]
  c_const: [c_const, ccons, c_cons]
  c_const_unit: [c_const_unit, ccons_unit]
  ccat_value: [ccat_value, ccat]
  ccat_unit: [ccat_unit]